<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DJ CueCraft Review</title>
    <link rel="stylesheet" href="./styles.css?v=5" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>DJ CueCraft</h1>
        <p id="summary">Loading tracks...</p>
      </div>
      <div class="toolbar">
        <label>
          Status
          <select id="statusFilter">
            <option value="">All</option>
            <option value="needs_review">Needs review</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="edited">Edited</option>
            <option value="rejected">Rejected</option>
            <option value="skipped">Skipped</option>
          </select>
        </label>
        <button id="refreshButton" type="button">Refresh</button>
      </div>
    </header>

    <main>
      <p class="hint">Click a track to edit its metadata and load it into the cue editor below.</p>
      <div class="tableShell">
        <table>
          <thead>
            <tr>
              <th class="caretCol"></th>
              <th>Track</th>
              <th>Artist / Title</th>
              <th>Confidence</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="trackRows"></tbody>
        </table>
      </div>
    </main>

    <section id="cueEditor" class="cueEditor">
      <div class="editorBar">
        <div class="editorTrackInfo">
          <strong id="editorTrackName">Select a track to load the cue editor</strong>
          <span id="editorTrackMeta"></span>
        </div>
        <div class="editorTransport">
          <button id="playButton" type="button" disabled>▶ Play</button>
          <button id="stopButton" class="secondaryButton" type="button" disabled>■ Stop</button>
          <span id="editorTime" class="editorTime">0:00 / 0:00</span>
          <label class="metronomeToggle">
            <input type="checkbox" id="metronomeToggle" /> Metronome
          </label>
          <span id="editorBpm" class="editorBpm"></span>
        </div>
      </div>
      <canvas id="waveform" class="waveform" height="120"></canvas>
      <div class="padBar">
        <button id="analyzeBeatsButton" type="button" disabled>Analyze beats</button>
        <label class="padPresetLabel">Preset
          <select id="padPreset" disabled>
            <option value="">phrase</option>
          </select>
        </label>
        <button id="autoFillPadsButton" class="secondaryButton" type="button" disabled>Auto-fill pads</button>
        <button id="clearAllPadsButton" class="secondaryButton" type="button" disabled>Clear all</button>
        <span id="padState" class="padState"></span>
      </div>
      <div id="padGrid" class="padGrid"></div>
    </section>

    <template id="padTemplate">
      <div class="pad">
        <div class="padTop">
          <span class="padLabel" data-field="label"></span>
          <button class="padRename" type="button" title="Rename pad" aria-label="Rename pad">&#9998;</button>
        </div>
        <div class="padTime" data-field="time">—</div>
        <div class="padButtons">
          <button class="padJump" type="button">Jump</button>
          <button class="padSet secondaryButton" type="button" title="Set to current playhead">Set</button>
          <button class="padClear secondaryButton" type="button" title="Clear this pad">Clear</button>
        </div>
      </div>
    </template>

    <template id="trackRowTemplate">
      <tr class="summaryRow">
        <td class="caretCol"><span class="caret">▸</span></td>
        <td class="trackCell">
          <strong data-field="file_name"></strong>
          <span data-field="file_path"></span>
        </td>
        <td data-field="summary_artist_title"></td>
        <td data-field="summary_confidence"></td>
        <td><span class="statusBadge" data-field="summary_status"></span></td>
      </tr>
      <tr class="detailRow" hidden>
        <td colspan="5">
          <div class="detailGrid">
            <div class="detailBlock">
              <h3>Original Metadata</h3>
              <dl class="metadataList">
                <div><dt>Artist</dt><dd data-field="artist"></dd></div>
                <div><dt>Title</dt><dd data-field="title"></dd></div>
                <div><dt>Album</dt><dd data-field="album"></dd></div>
                <div><dt>Year</dt><dd data-field="year"></dd></div>
                <div><dt>Genre</dt><dd data-field="original_genre"></dd></div>
              </dl>
              <div class="warnings" data-field="missing_fields"></div>
            </div>

            <div class="detailBlock">
              <h3>Suggested Metadata</h3>
              <div class="suggestionBox">
                <strong data-field="suggested_normalized_label"></strong>
                <span data-field="review_required"></span>
                <p data-field="reason"></p>
              </div>
              <div class="editGrid">
                <label>Decade <input data-input="normalized_decade" /></label>
                <label>Primary <input data-input="normalized_primary_genre" /></label>
                <label>Subgenre <input data-input="normalized_subgenre" /></label>
                <label>Tags <input data-input="dj_use_tags" /></label>
              </div>
              <dl class="metadataList compact">
                <div><dt>Metadata</dt><dd data-field="metadata_confidence"></dd></div>
                <div><dt>Genre</dt><dd data-field="genre_confidence"></dd></div>
                <div><dt>BPM</dt><dd data-field="bpm_confidence"></dd></div>
              </dl>
            </div>

            <div class="detailBlock">
              <h3>Review</h3>
              <label class="statusLabel">Status
                <select data-input="review_status">
                  <option value="needs_review">needs_review</option>
                  <option value="pending">pending</option>
                  <option value="approved">approved</option>
                  <option value="edited">edited</option>
                  <option value="rejected">rejected</option>
                  <option value="skipped">skipped</option>
                </select>
              </label>
              <div class="actionCell">
                <button data-action="approve" type="button">Approve</button>
                <button class="secondaryButton" data-action="save-edit" type="button">Save Edit</button>
                <button class="secondaryButton" data-action="reject" type="button">Reject</button>
                <button class="secondaryButton" data-action="skip" type="button">Skip</button>
                <button class="secondaryButton" data-action="history" type="button">History</button>
                <span class="rowState" data-field="row_state"></span>
                <div class="historyPanel" data-field="history_panel"></div>
              </div>
            </div>
          </div>
        </td>
      </tr>
    </template>

    <script src="./app.js?v=5"></script>
  </body>
</html>
